services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: submissions_db
      POSTGRES_USER: submissions_user
      POSTGRES_PASSWORD: submissions_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    command: gunicorn project.wsgi:application --bind 0.0.0.0:8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DJANGO_SETTINGS_MODULE: project.settings

volumes:
  postgres_data:
